name: little-brother

services:
  db:
    image: postgres:16.4
    container_name: little-brother-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-little_brother}
      POSTGRES_USER: ${POSTGRES_USER:-little_brother}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./core/rs/apps/vision-inference/web
    container_name: little-brother-web
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_HOST:-127.0.0.1}:${WEB_PORT:-8088}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
