name: little-brother

services:
  db:
    image: postgres:16.4
    container_name: little-brother-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-little_brother}
      POSTGRES_USER: ${POSTGRES_USER:-little_brother}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
