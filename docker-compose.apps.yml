services:
  backend:
    build:
      context: ./backend
    image: broder/backend:dev
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://appuser:password@db:5432/appdb}
      DATABASE_URL_HOST: ${DATABASE_URL_HOST:-postgresql://appuser:password@localhost:5432/appdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_URL_HOST: ${REDIS_URL_HOST:-redis://localhost:6379/0}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - broder_net

  frontend:
    build:
      context: ./frontend
    image: broder/frontend:dev
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - broder_net

networks:
  broder_net:
    name: broder_net
